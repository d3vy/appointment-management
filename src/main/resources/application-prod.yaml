# TLS must terminate in front of the app; Actuator uses HTTP Basic on /actuator/* (except /health).
spring:
  data:
    redis:
      password: ${REDIS_PASSWORD}
  datasource:
    password: ${DB_PASSWORD}

logging:
  level:
    root: INFO
    com.telegrambot: INFO
    com.telegrambot.appointment.management.adapter.telegram.router.UpdateRouter: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: never
