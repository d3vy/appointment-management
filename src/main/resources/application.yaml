bot:
  name: ${BOT_NAME}
  token: ${BOT_TOKEN}

spring:
  application:
    name: appointment-management

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appointment_bot}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
      default-schema: public
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    com.telegrambot: INFO
    org.hibernate.SQL: DEBUG
