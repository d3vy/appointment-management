services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appointment_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - appointment_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  appointment_pg:
