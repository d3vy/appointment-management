services:
  app:
    build: .
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/appointment_bot
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env (no default for production parity)}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      ACTUATOR_USERNAME: ${ACTUATOR_USERNAME:-actuator}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD:?Set ACTUATOR_PASSWORD in .env}
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appointment_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - appointment_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}

volumes:
  appointment_pg:
